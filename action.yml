name: 'Mermaid to SVG'
description: 'Convert Mermaid diagram sources to SVG that any file in the repo can embed.'
author: 'soumaya'

branding:
  icon: 'image'
  color: 'purple'

inputs:
  source-dir:
    description: 'Directory containing Mermaid sources (.mmd, .mermaid, .md).'
    required: false
    default: 'mermaid/source'
  output-dir:
    description: 'Directory the generated SVGs are written to (mirrors source-dir).'
    required: false
    default: 'mermaid/generated'
  config:
    description: 'Optional path to a Mermaid config JSON. Empty means mermaid-cli defaults.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v7
      with:
        node-version: 20

    # The lockfile pins mermaid-cli and puppeteer (and via puppeteer, the
    # Chrome build), so conversions stay reproducible across runs.
    - name: Install mermaid-cli
      shell: bash
      run: cd "$GITHUB_ACTION_PATH" && npm ci

    - name: Convert Mermaid to SVG
      shell: bash
      env:
        SOURCE_DIR: ${{ inputs.source-dir }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        CONFIG: ${{ inputs.config }}
      run: node "$GITHUB_ACTION_PATH/src/main.mjs"
