name: 'Mermaid to SVG'
description: 'Render Mermaid diagram sources to SVGs any file in the repo can embed.'
author: 'soumaya'

branding:
  icon: 'image'
  color: 'purple'

inputs:
  source-dir:
    description: 'Directory containing Mermaid sources (.mmd, .mermaid, .md).'
    required: false
    default: 'mermaid/source'
  output-dir:
    description: 'Directory the generated SVGs are written to (mirrors source-dir).'
    required: false
    default: 'mermaid/generated'
  config:
    description: 'Optional path to a Mermaid config JSON, passed to mmdc -c. Empty means mermaid-cli defaults.'
    required: false
    default: ''

runs:
  using: 'docker'
  # Prebuilt by the Release workflow, so consumers pull instead of building.
  # The moving :v1 image tag is updated alongside the v1 git tag on release.
  # Local development never uses this reference — render.sh and the smoke
  # test build the Dockerfile directly.
  image: 'docker://ghcr.io/sumau/mermaid-to-svg:v1'
  env:
    SOURCE_DIR: ${{ inputs.source-dir }}
    OUTPUT_DIR: ${{ inputs.output-dir }}
    CONFIG: ${{ inputs.config }}
