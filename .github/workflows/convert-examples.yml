name: Convert example diagrams

# Re-converts examples/mermaid and commits the SVGs back to the pushed branch.
# Runs on every branch (not just main) so PRs show the generated SVG diff.

on:
  push:
    paths:
      - "examples/**"
      - "src/**"
      - "action.yml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/convert-examples.yml"
  workflow_dispatch:

concurrency:
  # Serialize runs per branch so the commit-back push can't hit a
  # non-fast-forward error when two pushes to the same branch overlap.
  group: convert-examples-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Runs the working tree's action itself — the exact code path consumers
      # get, since the composite action installs from this repo's lockfile.
      - name: Convert Mermaid to SVG
        uses: ./
        with:
          source-dir: examples/mermaid/source
          output-dir: examples/mermaid/generated
          config: examples/mermaid/config.json

      - name: Commit generated SVGs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # -A stages deleted orphaned SVGs as deletions too.
          git add -A examples/mermaid/generated

          if git diff --cached --quiet; then
            echo "No diagram changes to commit"
          else
            git commit -m "Synchronize generated Mermaid diagrams"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
