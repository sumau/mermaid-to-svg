name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Shellcheck
        run: shellcheck convert.sh test/smoke-test.sh

      - name: Lint workflows
        uses: docker://rhysd/actionlint:1.7.7

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # The runner's Node is enough for the unit tests; no dependencies needed.
      - name: Unit tests
        run: npm test

      # Installs the pinned dependencies and exercises the entrypoint
      # end-to-end against a fixture tree: conversion, Markdown extraction,
      # orphan cleanup, collision guard.
      - name: Smoke test
        run: ./convert.sh smoke
