name: Convert Mermaid diagrams to SVG

on:
  push:
    paths:
      # Trigger when Mermaid sources, the extractor, the action's files, or this
      # workflow change.
      - "mermaid/**"
      - "scripts/**"
      - "entrypoint.sh"
      - "Dockerfile"
      - "action.yml"
      - ".github/workflows/convert-mermaid.yml"
  workflow_dispatch:

concurrency:
  # Serialize runs per branch so the commit-back push can't hit a
  # non-fast-forward error when two pushes to the same branch overlap.
  group: mermaid-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Dogfood: render this repo's own diagrams with the action defined here.
      - name: Test Markdown extractor
        run: ./render.sh test

      - name: Render Mermaid to SVG
        uses: ./
        with:
          source-dir: mermaid/source
          output-dir: mermaid/generated
          config: mermaid/config.json

      # Commit-back stays in the workflow for now (Phase 1): the action only
      # renders. Whether this moves into the action is a separate decision.
      - name: Commit generated SVGs if changed
        run: |
          OUTPUT_DIR=mermaid/generated

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # -A stages deleted orphaned SVGs as deletions too.
          git add -A "$OUTPUT_DIR"

          if git diff --cached --quiet; then
            echo "No diagram changes to commit"
          else
            git commit -m "Synchronize generated Mermaid diagrams"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
