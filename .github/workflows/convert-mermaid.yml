name: Convert Mermaid diagrams to SVG

on:
  push:
    paths:
      # Trigger when Mermaid source files or Markdown Mermaid files change.
      # These paths cannot use env variables because GitHub evaluates them before jobs run.
      - "mermaid/source/**/*.mmd"
      - "mermaid/source/**/*.mermaid"
      - "mermaid/source/**/*.md"
      - ".github/workflows/convert-mermaid.yml"
  workflow_dispatch:

concurrency:
  # Serialize runs per branch so the commit-back push can't hit a
  # non-fast-forward error when two pushes to the same branch overlap.
  group: mermaid-${{ github.ref }}
  cancel-in-progress: true

env:
  # Source files are authored here.
  MERMAID_SOURCE_DIR: mermaid/source

  # Generated SVGs are committed here.
  MERMAID_OUTPUT_DIR: mermaid/generated

  # Temporary extracted .mmd files from Markdown are written here.
  MERMAID_TEMP_DIR: .mermaid-tmp

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Mermaid CLI and Puppeteer
        run: |
          npm install --no-save @mermaid-js/mermaid-cli puppeteer

      - name: Create Puppeteer config
        run: |
          cat > puppeteer-config.json <<'EOF'
          {
            "args": [
              "--no-sandbox",
              "--disable-setuid-sandbox",
              "--disable-dev-shm-usage"
            ]
          }
          EOF

      - name: Extract first Mermaid code block from Markdown
        run: |
          # Recreate the temp directory on each run.
          rm -rf "${MERMAID_TEMP_DIR}"
          mkdir -p "${MERMAID_TEMP_DIR}"

          # If there are no Markdown files, there is nothing to extract.
          if ! find "${MERMAID_SOURCE_DIR}" -name "*.md" | grep -q .; then
            echo "No .md files found in ${MERMAID_SOURCE_DIR}; skipping Markdown extraction"
            exit 0
          fi

          find "${MERMAID_SOURCE_DIR}" -name "*.md" | while read -r file; do
            # Preserve the source directory structure in the temp directory.
            relative_path="${file#${MERMAID_SOURCE_DIR}/}"
            temp_file="${MERMAID_TEMP_DIR}/${relative_path%.md}.mmd"

            mkdir -p "$(dirname "${temp_file}")"

            # Extract only the first fenced Mermaid code block.
            # The backtick fence is built using ASCII 96 to avoid literal triple-backtick issues.
            awk '
              BEGIN {
                fence = sprintf("%c%c%c", 96, 96, 96)
              }

              $0 ~ "^[[:space:]]*" fence "mermaid[[:space:]]*$" {
                in_block = 1
                next
              }

              $0 ~ "^[[:space:]]*" fence "[[:space:]]*$" && in_block {
                exit
              }

              in_block {
                print
              }
            ' "${file}" > "${temp_file}"

            # By design only the first mermaid block is rendered (one diagram per
            # page, one predictable image name). Warn when a page has more, so the
            # skipped blocks are visible in the Actions log instead of vanishing silently.
            block_count=$(grep -cE '^[[:space:]]*```mermaid[[:space:]]*$' "${file}")
            if [ "${block_count}" -gt 1 ]; then
              echo "::warning file=${file}::Found ${block_count} mermaid blocks; only the first is rendered."
            fi

            if [ -s "${temp_file}" ]; then
              echo "Extracted first Mermaid code block from ${file} -> ${temp_file}"
            else
              rm -f "${temp_file}"
            fi
          done

      - name: Generate Mermaid SVG diagrams
        run: |
          mkdir -p "${MERMAID_OUTPUT_DIR}"

          # Track which source produced each output so two sources that map to the
          # same .svg (e.g. diagram.mmd and diagram.md) fail loudly instead of
          # silently clobbering each other in a nondeterministic order.
          declare -A output_source

          # Render authored Mermaid files and temporary Markdown extractions.
          # Process substitution (rather than a pipe) keeps output_source populated
          # in this shell; a pipe would run the loop body in a subshell and lose it.
          while read -r file; do
            # Work out the relative path from the correct source root.
            if [[ "${file}" == "${MERMAID_TEMP_DIR}"/* ]]; then
              relative_path="${file#${MERMAID_TEMP_DIR}/}"
            else
              relative_path="${file#${MERMAID_SOURCE_DIR}/}"
            fi

            # Preserve folder structure and replace the source extension with .svg.
            output_file="${MERMAID_OUTPUT_DIR}/${relative_path%.*}.svg"

            # Fail if a different source already claimed this output path.
            if [ -n "${output_source[${output_file}]:-}" ]; then
              echo "::error::Output collision: '${file}' and '${output_source[${output_file}]}' both map to '${output_file}'. Rename one source so each produces a unique .svg."
              exit 1
            fi
            output_source[${output_file}]="${file}"

            mkdir -p "$(dirname "${output_file}")"

            echo "Rendering ${file} -> ${output_file}"

            npx mmdc \
              -p puppeteer-config.json \
              -i "${file}" \
              -o "${output_file}"
          done < <(find "${MERMAID_SOURCE_DIR}" "${MERMAID_TEMP_DIR}" \
            \( -name "*.mmd" -o -name "*.mermaid" \))

      - name: Remove orphaned SVGs
        run: |
          if [ -d "${MERMAID_OUTPUT_DIR}" ]; then
            find "${MERMAID_OUTPUT_DIR}" -name "*.svg" | while read -r svg; do
              relative_path="${svg#${MERMAID_OUTPUT_DIR}/}"

              # A generated SVG is valid if a matching source file still exists.
              source_md="${MERMAID_SOURCE_DIR}/${relative_path%.svg}.md"
              source_mmd="${MERMAID_SOURCE_DIR}/${relative_path%.svg}.mmd"
              source_mermaid="${MERMAID_SOURCE_DIR}/${relative_path%.svg}.mermaid"

              if [ ! -f "${source_md}" ] \
                && [ ! -f "${source_mmd}" ] \
                && [ ! -f "${source_mermaid}" ]; then
                echo "Removing orphaned SVG: ${svg}"
                rm "${svg}"
              fi
            done

            # Remove empty generated directories left behind after deleting SVGs.
            find "${MERMAID_OUTPUT_DIR}" -type d -empty -delete
          else
            echo "No generated SVG directory found at ${MERMAID_OUTPUT_DIR}; skipping orphan cleanup"
          fi

      - name: Remove temporary Markdown extractions
        run: |
          echo "Removing temporary Mermaid extraction directory"
          rm -rf "${MERMAID_TEMP_DIR}"

      - name: Commit generated SVGs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # -A is needed so deleted orphaned SVGs are staged as deletions.
          git add -A "${MERMAID_OUTPUT_DIR}"

          if git diff --cached --quiet; then
            echo "No diagram changes to commit"
          else
            git commit -m "Synchronize generated Mermaid diagrams"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi