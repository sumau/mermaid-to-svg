name: Convert Mermaid diagrams to SVG

on:
  push:
    paths:
      # Trigger when Mermaid sources, the shared config, the extractor, the
      # render script, or this workflow change.
      - "mermaid/**"
      - "scripts/**"
      - "render.sh"
      - "render.config"
      - ".github/workflows/convert-mermaid.yml"
  workflow_dispatch:

concurrency:
  # Serialize runs per branch so the commit-back push can't hit a
  # non-fast-forward error when two pushes to the same branch overlap.
  group: mermaid-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Docker is preinstalled on the runner; render.sh runs everything inside
      # the pinned mermaid-cli image, so there's no Node/Puppeteer setup.
      - name: Test Markdown extractor
        run: ./render.sh test

      # Split into two phases so a failure points at the phase that broke:
      # extraction (Markdown parsing) vs conversion (Chromium rendering).
      - name: Extract Mermaid from Markdown
        run: ./render.sh extract

      - name: Convert Mermaid to SVG
        run: ./render.sh convert

      - name: Commit generated SVGs if changed
        run: |
          source ./render.config  # for $OUTPUT_DIR

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # -A stages deleted orphaned SVGs as deletions too.
          git add -A "$OUTPUT_DIR"

          if git diff --cached --quiet; then
            echo "No diagram changes to commit"
          else
            git commit -m "Synchronize generated Mermaid diagrams"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
