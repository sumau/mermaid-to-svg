name: Convert Mermaid diagrams to SVG

on:
  push:
    paths:
      - "mermaid/source/**/*.mmd"
      - "mermaid/source/**/*.mermaid"
      - "mermaid/source/**/*.md"
      - ".github/workflows/convert-mermaid.yml"
  workflow_dispatch:

env:
  MERMAID_SOURCE_DIR: mermaid/source
  MERMAID_OUTPUT_DIR: mermaid/generated
  MERMAID_TEMP_DIR: .mermaid-tmp

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Mermaid CLI and Puppeteer
        run: |
          npm install --no-save @mermaid-js/mermaid-cli puppeteer

      - name: Create Puppeteer config
        run: |
          cat > puppeteer-config.json <<'EOF'
          {
            "args": [
              "--no-sandbox",
              "--disable-setuid-sandbox",
              "--disable-dev-shm-usage"
            ]
          }
          EOF

      - name: Extract first Mermaid code block from Markdown
        run: |
          rm -rf "${MERMAID_TEMP_DIR}"
          mkdir -p "${MERMAID_TEMP_DIR}"

          if ! find "${MERMAID_SOURCE_DIR}" -name "*.md" | grep -q .; then
            echo "No .md files found in ${MERMAID_SOURCE_DIR}; skipping Markdown extraction"
            exit 0
          fi

          find "${MERMAID_SOURCE_DIR}" -name "*.md" | while read -r file; do
            relative_path="${file#${MERMAID_SOURCE_DIR}/}"
            temp_file="${MERMAID_TEMP_DIR}/${relative_path%.md}.mmd"

            mkdir -p "$(dirname "${temp_file}")"

            awk '
              BEGIN {
                fence = sprintf("%c%c%c", 96, 96, 96)
              }

              $0 ~ "^[[:space:]]*" fence "mermaid[[:space:]]*$" {
                in_block = 1
                next
              }

              $0 ~ "^[[:space:]]*" fence "[[:space:]]*$" && in_block {
                exit
              }

              in_block {
                print
              }
            ' "${file}" > "${temp_file}"

            if [ -s "${temp_file}" ]; then
              echo "Extracted first Mermaid code block from ${file} -> ${temp_file}"
            else
              rm -f "${temp_file}"
            fi
          done
      
      - name: Convert Mermaid diagrams to SVG
        run: |
          mkdir -p "${MERMAID_OUTPUT_DIR}"

          find "${MERMAID_SOURCE_DIR}" "${MERMAID_TEMP_DIR}" \
            \( -name "*.mmd" -o -name "*.mermaid" \) \
            | while read -r file; do

              if [[ "${file}" == "${MERMAID_TEMP_DIR}"/* ]]; then
                relative_path="${file#${MERMAID_TEMP_DIR}/}"
              else
                relative_path="${file#${MERMAID_SOURCE_DIR}/}"
              fi

              output_file="${MERMAID_OUTPUT_DIR}/${relative_path%.*}.svg"

              mkdir -p "$(dirname "${output_file}")"

              echo "Rendering ${file} -> ${output_file}"

              npx mmdc \
                -p puppeteer-config.json \
                -i "${file}" \
                -o "${output_file}"
            done

      - name: Remove orphaned SVGs
        run: |
          if [ -d "${MERMAID_OUTPUT_DIR}" ]; then
            find "${MERMAID_OUTPUT_DIR}" -name "*.svg" | while read -r svg; do

              relative_path="${svg#${MERMAID_OUTPUT_DIR}/}"
              source_mmd="${MERMAID_SOURCE_DIR}/${relative_path%.svg}.mmd"
              source_mermaid="${MERMAID_SOURCE_DIR}/${relative_path%.svg}.mermaid"
              source_md="${MERMAID_SOURCE_DIR}/${relative_path%.svg}.md"

              if [ ! -f "${source_mmd}" ] && [ ! -f "${source_mermaid}" ]; then
                echo "Removing orphaned SVG: ${svg}"
                rm "${svg}"
              fi
            done
          fi

      - name: Commit generated SVGs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${MERMAID_OUTPUT_DIR}"

          if git diff --cached --quiet; then
            echo "No diagram changes to commit"
          else
            git commit -m "Synchronize generated Mermaid diagrams"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi