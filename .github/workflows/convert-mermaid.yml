name: Verify Mermaid diagrams are up to date

on:
  pull_request:
    paths:
      - "mermaid/**"
      - "scripts/**"
      - "render.sh"
      - "puppeteer-config.json"
      - ".github/workflows/convert-mermaid.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mermaid-verify-${{ github.ref }}
  cancel-in-progress: true

# Read-only: this workflow verifies, it never commits.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Docker is preinstalled on the runner, so no Node/Puppeteer setup is
      # needed. render.sh and the tests both run inside the pinned image.
      - name: Test Markdown extractor
        run: make test

      - name: Render diagrams
        run: ./render.sh

      - name: Check diagrams are committed and up to date
        run: |
          # render.sh writes into mermaid/generated; if anything changed, the
          # committed SVGs don't match their sources.
          changes="$(git status --porcelain -- mermaid/generated)"
          if [ -n "${changes}" ]; then
            echo "::error::Generated SVGs are out of date. Run 'make diagrams' (or ./render.sh) and commit the result."
            echo "${changes}"
            git --no-pager diff --stat -- mermaid/generated
            exit 1
          fi
          echo "Diagrams are up to date."
